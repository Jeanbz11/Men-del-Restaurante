<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Ventas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 id="admin-title" class="text-2xl font-bold text-gray-800 italic">Diario de Ventas</h1>
            <div class="bg-white p-3 rounded-lg shadow-sm border">
                <span class="text-sm text-gray-500">Hoy es:</span>
                <p id="today-date" class="font-bold"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Ventas de Hoy</p>
                <h2 id="total-today" class="text-3xl font-bold text-gray-800">$0.00</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Cant. Pedidos</p>
                <h2 id="count-today" class="text-3xl font-bold text-gray-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-orange-500">
                <p class="text-sm text-gray-500 uppercase font-semibold">Promedio por Mesa</p>
                <h2 id="avg-today" class="text-3xl font-bold text-gray-800">$0.00</h2>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <h3 class="font-bold text-gray-700">Detalle de Órdenes Recientes</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs uppercase text-gray-400 border-b">
                            <th class="p-4">Hora</th>
                            <th class="p-4">Mesa</th>
                            <th class="p-4">Productos</th>
                            <th class="p-4 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="sales-table-body" class="divide-y text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin-script.js"></script>
</body>
</html>
